# Supabase PostgreSQL profile
# Activate with: --spring.profiles.active=supabase
# Set these environment variables before running:
# SPRING_DATASOURCE_URL=jdbc:postgresql://<pooler-host>:6543/postgres?sslmode=require&prepareThreshold=0
# SPRING_DATASOURCE_USERNAME=postgres.<your-project-ref>
# SPRING_DATASOURCE_PASSWORD=<your-db-password>

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Keep DB connection usage low for restricted Supabase session pools.
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=300000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
